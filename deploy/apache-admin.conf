# Reverse proxy to the TumiraCMS Node app (systemd: tumiracms)
#
# /media is served directly from disk, bypassing Node — both because it's
# faster for static assets and because Next.js's /public static serving only
# recognizes files present at process startup, which would make newly
# uploaded media invisible until a restart.
Alias /media /home/shoptumira/public_html/shop.tumirathumela.com/cms/media
<Directory "/home/shoptumira/public_html/shop.tumirathumela.com/cms/media">
    Require all granted
    Options -Indexes -ExecCGI
    AllowOverride None
</Directory>

ProxyPass /.well-known/acme-challenge/ !
ProxyPass /media !
ProxyPreserveHost On
ProxyPass / http://127.0.0.1:3002/
ProxyPassReverse / http://127.0.0.1:3002/
